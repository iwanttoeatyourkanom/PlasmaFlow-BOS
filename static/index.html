<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOS Image Analysis</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
      color: #f8fafc;
    }

    .subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 2rem;
    }

    .upload-row {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .drop-zone {
      width: 300px;
      border: 2px dashed #334155;
      border-radius: 10px;
      padding: 1.25rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #1e2535;
    }

    .drop-zone:hover, .drop-zone.over {
      border-color: #6366f1;
      background: #1e2840;
    }

    .drop-zone label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin-bottom: 0.75rem;
    }

    .drop-zone input[type="file"] { display: none; }

    .preview-box {
      width: 100%;
      height: 160px;
      background: #0f1117;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-bottom: 0.75rem;
    }

    .preview-box img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .preview-box .placeholder {
      color: #475569;
      font-size: 0.8rem;
      text-align: center;
      line-height: 1.6;
    }

    .file-name {
      font-size: 0.75rem;
      color: #64748b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-row {
      display: flex;
      justify-content: center;
      margin-bottom: 2rem;
    }

    button#analyzeBtn {
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.7rem 2.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    button#analyzeBtn:hover:not(:disabled) { background: #4f46e5; }
    button#analyzeBtn:disabled { opacity: 0.45; cursor: not-allowed; }

    #status {
      text-align: center;
      font-size: 0.85rem;
      color: #94a3b8;
      min-height: 1.4rem;
      margin-bottom: 1.5rem;
    }

    #status.error { color: #f87171; }

    #results {
      display: none;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    #results.visible { display: flex; }

    .result-card {
      background: #1e2535;
      border-radius: 10px;
      padding: 1rem;
      width: 340px;
    }

    .result-card h3 {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin-bottom: 0.75rem;
    }

    .result-card img {
      width: 100%;
      border-radius: 6px;
      display: block;
      margin-bottom: 0.75rem;
    }

    .result-card a {
      display: inline-block;
      background: #334155;
      color: #e2e8f0;
      text-decoration: none;
      font-size: 0.8rem;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .result-card a:hover { background: #475569; }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #ffffff44;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <h1>BOS Image Analysis</h1>
  <p class="subtitle">Background-Oriented Schlieren — upload reference &amp; test images to visualize density differences</p>

  <div class="upload-row">
    <div class="drop-zone" id="refZone">
      <label>Reference image (no flame)</label>
      <div class="preview-box" id="refPreviewBox">
        <span class="placeholder">Click or drag &amp; drop<br/>PNG / JPG / BMP</span>
      </div>
      <div class="file-name" id="refFileName">No file chosen</div>
      <input type="file" id="refInput" accept="image/*" />
    </div>

    <div class="drop-zone" id="testZone">
      <label>Test image (with flame)</label>
      <div class="preview-box" id="testPreviewBox">
        <span class="placeholder">Click or drag &amp; drop<br/>PNG / JPG / BMP</span>
      </div>
      <div class="file-name" id="testFileName">No file chosen</div>
      <input type="file" id="testInput" accept="image/*" />
    </div>
  </div>

  <div class="btn-row">
    <button id="analyzeBtn" disabled>Analyze</button>
  </div>

  <div id="status"></div>

  <div id="results">
    <div class="result-card">
      <h3>Grayscale difference</h3>
      <img id="grayImg" src="" alt="Grayscale diff" />
      <a id="grayDl" download="diff_grayscale.png">Download PNG</a>
    </div>
    <div class="result-card">
      <h3>Pseudo-color (JET colormap)</h3>
      <img id="colorImg" src="" alt="Color diff" />
      <a id="colorDl" download="diff_color.png">Download PNG</a>
    </div>
  </div>

  <script>
    const refInput    = document.getElementById('refInput');
    const testInput   = document.getElementById('testInput');
    const analyzeBtn  = document.getElementById('analyzeBtn');
    const statusEl    = document.getElementById('status');
    const resultsEl   = document.getElementById('results');

    function setupZone(zoneId, inputEl, previewBoxId, fileNameId) {
      const zone = document.getElementById(zoneId);
      const previewBox = document.getElementById(previewBoxId);
      const fileNameEl = document.getElementById(fileNameId);

      zone.addEventListener('click', () => inputEl.click());

      zone.addEventListener('dragover', e => {
        e.preventDefault();
        zone.classList.add('over');
      });
      zone.addEventListener('dragleave', () => zone.classList.remove('over'));
      zone.addEventListener('drop', e => {
        e.preventDefault();
        zone.classList.remove('over');
        const file = e.dataTransfer.files[0];
        if (file) setFile(inputEl, previewBox, fileNameEl, file);
      });

      inputEl.addEventListener('change', () => {
        if (inputEl.files[0]) setFile(inputEl, previewBox, fileNameEl, inputEl.files[0]);
      });
    }

    function setFile(inputEl, previewBox, fileNameEl, file) {
      // Assign to the hidden input via DataTransfer so fetch FormData can read it
      const dt = new DataTransfer();
      dt.items.add(file);
      inputEl.files = dt.files;

      fileNameEl.textContent = file.name;

      const reader = new FileReader();
      reader.onload = e => {
        previewBox.innerHTML = `<img src="${e.target.result}" alt="preview" />`;
      };
      reader.readAsDataURL(file);

      updateBtn();
    }

    function updateBtn() {
      analyzeBtn.disabled = !(refInput.files.length && testInput.files.length);
    }

    setupZone('refZone',  refInput,  'refPreviewBox',  'refFileName');
    setupZone('testZone', testInput, 'testPreviewBox', 'testFileName');

    analyzeBtn.addEventListener('click', async () => {
      statusEl.className = '';
      statusEl.innerHTML = '<span class="spinner"></span>Analyzing…';
      resultsEl.classList.remove('visible');
      analyzeBtn.disabled = true;

      const fd = new FormData();
      fd.append('reference', refInput.files[0]);
      fd.append('test',      testInput.files[0]);

      try {
        const res = await fetch('/analyze', { method: 'POST', body: fd });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || `Server error ${res.status}`);
        }
        const data = await res.json();

        const grayImg  = document.getElementById('grayImg');
        const colorImg = document.getElementById('colorImg');
        const grayDl   = document.getElementById('grayDl');
        const colorDl  = document.getElementById('colorDl');

        grayImg.src  = `data:image/png;base64,${data.grayscale}`;
        colorImg.src = `data:image/png;base64,${data.color}`;
        grayDl.href  = grayImg.src;
        colorDl.href = colorImg.src;

        statusEl.textContent = 'Analysis complete.';
        resultsEl.classList.add('visible');
      } catch (err) {
        statusEl.className = 'error';
        statusEl.textContent = `Error: ${err.message}`;
      } finally {
        analyzeBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
